
# Runs on every push to every branch.
# Lint and test jobs always run.
# The deploy job only appears on pushes to main, and requires a human to
# approve it before it executes (see "environment: production" below).
on:
  push:

jobs:
  # ─── Backend lint ──────────────────────────────────────────────────────────

  lint-backend:
    name: Lint backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint

  # ─── Web lint ─────────────────────────────────────────────────────────────

  lint-web:
    name: Lint web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run lint

  # ─── Backend tests (unit / integration / e2e run in parallel) ─────────────

  test-backend:
    name: Test backend (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        suite: [unit, int, e2e]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run test:${{ matrix.suite }}

  # ─── Build & push Docker images (main branch only, human-gated) ───────────
  #
  # This job only runs on the main branch. Because it targets the "production"
  # environment, GitHub will pause here and wait for a human to approve before
  # executing any steps. Configure the environment in:
  #   GitHub repo → Settings → Environments → production → Required reviewers
  #
  # Required secrets (repo or environment level):
  #   DOCKER_REGISTRY      - hostname of your private registry
  #   DOCKER_USERNAME      - registry login username
  #   DOCKER_PASSWORD      - registry login password / token
  #   VITE_API_BASE_URL    - e.g. https://api.yourdomain.com
  #   VITE_GOOGLE_CLIENT_ID

  deploy:
    name: Build & push Docker images
    needs: [lint-backend, lint-web, test-backend]
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" \
            | docker login "${{ secrets.DOCKER_REGISTRY }}" \
                -u "${{ secrets.DOCKER_USERNAME }}" \
                --password-stdin

      - name: Build and push backend API image
        run: |
          docker build \
            -t "${{ secrets.DOCKER_REGISTRY }}/fitnesstracker-api:latest" \
            backend/
          docker push "${{ secrets.DOCKER_REGISTRY }}/fitnesstracker-api:latest"

      - name: Build and push web frontend image
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL="${{ secrets.VITE_API_BASE_URL }}" \
            --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
            -t "${{ secrets.DOCKER_REGISTRY }}/fitnesstracker-web:latest" \
            web/
          docker push "${{ secrets.DOCKER_REGISTRY }}/fitnesstracker-web:latest"